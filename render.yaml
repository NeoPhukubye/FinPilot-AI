databases:
  - name: finpilot-db
    plan: free
    databaseName: finpilot
    user: finpilot

services:
  - type: web
    name: finpilot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finpilot-db
          property: connectionURI
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: PINCH_SANDBOX
        value: "true"
      - key: PYTHON_VERSION
        value: "3.11.6"
    healthCheckPath: /health
